media:
  input: src/img
  output: /img
  rename: false
  categories: [image]
content:
  - name: pages
    label: Pages
    type: collection
    path: source/_posts
    fields:
      - name: title
        type: string
      - name: index_img
        label: index_img
        type: image
        options:
          path: source/img
      - name: date
        type: date
        label: "发表时间"
        default: ""
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ss
      - name: Math
        type: boolean
      - name: body
        type: rich-text